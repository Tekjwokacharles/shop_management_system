<!DOCTYPE html>
<html>
<head>
    <title>Edit Product</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Edit Product</h1>

    <form action="/edit/{{ product.id }}" method="POST">
        <input type="text" name="name" value="{{ product.name }}" required>
        <input type="number" step="0.01" name="price" value="{{ product.price }}" required>
        <input type="number" name="quantity" value="{{ product.quantity }}" required>
        <select name="unit">
            <option value="Kg" {% if product.unit == 'Kg' %}selected{% endif %}>Kg</option>
            <option value="Liter" {% if product.unit == 'Liter' %}selected{% endif %}>Liter</option>
            <option value="Piece" {% if product.unit == 'Piece' %}selected{% endif %}>Piece</option>
            <option value="Bottle" {% if product.unit == 'Bottle' %}selected{% endif %}>Bottle</option>
        </select>
        <button type="submit">Save</button>
    </form>

    <p><a href="/product/{{ product.id }}">Cancel</a></p>
</body>
</html>
