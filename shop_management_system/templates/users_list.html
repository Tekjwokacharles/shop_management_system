<!DOCTYPE html>
<html>
<head>
    <title>Users</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Users</h1>

    <p><a href="/users/add">Add User</a></p>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Admin</th>
            <th>Created At</th>
            <th>Actions</th>
        </tr>
        {% for u in users %}
        <tr>
            <td>{{ u.id }}</td>
            <td>{{ u.username }}</td>
            <td>{{ 'Yes' if u.is_admin else 'No' }}</td>
            <td>{{ u.created_at }}</td>
            <td>
                <a href="/users/edit/{{ u.id }}">Edit</a>
                |
                <form action="/users/delete/{{ u.id }}" method="POST" style="display:inline;">
                    <button type="submit">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>

    <p><a href="/">Back to Shop</a></p>
</body>
</html>
