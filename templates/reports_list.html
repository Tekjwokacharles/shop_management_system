<!DOCTYPE html>
<html>
<head>
    <title>Saved Reports</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Saved Reports</h1>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Date</th>
            <th>Total Value</th>
            <th>Total Items</th>
            <th>Created At</th>
            <th>View</th>
        </tr>
        {% for r in reports %}
        <tr>
            <td>{{ r.id }}</td>
            <td>{{ r.report_date }}</td>
            <td>{{ r.total_value }}</td>
            <td>{{ r.total_items }}</td>
            <td>{{ r.created_at }}</td>
            <td><a href="/reports/{{ r.id }}">View</a></td>
        </tr>
        {% endfor %}
    </table>

    <p><a href="/">Back to Shop</a></p>
</body>
</html>
